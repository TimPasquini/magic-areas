input_select:
  startup_unknown_room_light_availability:
    name: Startup Unknown Room Light Availability
    options:
      - available
      - unavailable
      - unknown
    initial: available

input_number:
  living_room_lux:
    name: Living Room Lux
    min: 0
    max: 3000
    step: 10
    mode: slider
    unit_of_measurement: lx
  bathroom_lux:
    name: Bathroom Lux
    min: 0
    max: 3000
    step: 10
    mode: slider
    unit_of_measurement: lx
  classic_sun_room_lux:
    name: Classic Sun Room Lux
    min: 0
    max: 3000
    step: 10
    mode: slider
    unit_of_measurement: lx
  classic_sensor_room_lux:
    name: Classic Sensor Room Lux
    min: 0
    max: 3000
    step: 10
    mode: slider
    unit_of_measurement: lx
  advisory_sun_room_lux:
    name: Advisory Sun Room Lux
    min: 0
    max: 3000
    step: 10
    mode: slider
    unit_of_measurement: lx
  advisory_sensor_room_lux:
    name: Advisory Sensor Room Lux
    min: 0
    max: 3000
