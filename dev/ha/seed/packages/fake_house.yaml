        device_class: blind
        state: "{{ 'open' if is_state('input_boolean.setup_room_blinds_open', 'on') else 'closed' }}"
        open_cover:
          - action: input_boolean.turn_on
            target:
              entity_id:
                - input_boolean.setup_room_blinds_open
        close_cover:
          - action: input_boolean.turn_off
            target:
              entity_id:
                - input_boolean.setup_room_blinds_open
        stop_cover:
          - action: input_boolean.turn_off
            target:
              entity_id:
                - input_boolean.setup_room_blinds_open

climate:
  - platform: generic_thermostat
    unique_id: ma_dev_setup_room_thermostat
    name: Setup Room Thermostat
    heater: input_boolean.setup_room_heater
    target_sensor: sensor.setup_room_temperature
    min_temp: 60
    max_temp: 85
    target_temp: 72
    cold_tolerance: 0.5
    hot_tolerance: 0.5
    away_temp: 62

media_player:
  - platform: universal
    unique_id: ma_dev_setup_room_speaker
    name: Setup Room Speaker
    children: []
    commands:
      turn_on:
        action: input_boolean.turn_on
        target:
          entity_id: input_boolean.setup_room_speaker_power
      turn_off:
        action: input_boolean.turn_off
        target:
          entity_id: input_boolean.setup_room_speaker_power
      volume_up:
        action: input_boolean.turn_on
        target:
          entity_id: input_boolean.setup_room_speaker_power
      volume_down:
        action: input_boolean.turn_on
        target:
          entity_id: input_boolean.setup_room_speaker_power
    attributes:
      state: input_boolean.setup_room_speaker_power
