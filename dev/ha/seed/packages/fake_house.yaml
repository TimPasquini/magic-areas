        unique_id: ma_dev_startup_unknown_room_light
        device_class: light
        availability: "{{ not is_state('input_select.startup_unknown_room_light_availability', 'unavailable') }}"
        state: >
          {% if is_state('input_select.startup_unknown_room_light_availability', 'unknown') %}
            {{ states('sensor.startup_unknown_room_missing_light_state') }}
          {% else %}
            {{ states('input_number.startup_unknown_room_lux') | float(0) > 900 }}
          {% endif %}
