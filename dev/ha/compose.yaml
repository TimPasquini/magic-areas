services:
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: magic-areas-ha-dev
    restart: unless-stopped
    privileged: true
    network_mode: host
    environment:
      TZ: ${TZ:-America/New_York}
    volumes:
      - ./config:/config
      - ../../custom_components/magic_areas:/config/custom_components/magic_areas:ro
      - ./vendor/adaptive-lighting/custom_components/adaptive_lighting:/config/custom_components/adaptive_lighting:ro
