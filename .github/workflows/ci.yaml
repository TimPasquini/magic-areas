name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate integration
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install development and test dependencies
        run: uv sync --extra dev --extra test

      - name: Run Ruff
        run: uv run --extra dev --extra test ruff check custom_components tests

      - name: Check formatting
        run: uv run --extra dev --extra test ruff format --check custom_components tests

      - name: Run mypy
        run: uv run --extra dev --extra test mypy custom_components tests

      - name: Run tests
        run: uv run --extra test pytest tests -q
