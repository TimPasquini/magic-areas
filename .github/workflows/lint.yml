name: "Lint"

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"

permissions:
  contents: read

jobs:
  ruff:
    name: "Lint"
    runs-on: "ubuntu-latest"
    steps:
        - name: "Checkout the repository"
          uses: "actions/checkout@v5"

        - name: "Set up Python"
          uses: actions/setup-python@v6
          with:
            python-version: "3.13"

        - name: "Install uv"
          uses: astral-sh/setup-uv@v4

        - name: "Install dependencies"
          run: uv sync

        - name: "Run ruff check"
          run: uv run ruff check custom_components/magic_areas/

        - name: "Run ruff format check"
          run: uv run ruff format --check custom_components/magic_areas/

        - name: "Run mypy"
          run: uv run --extra dev --extra test mypy custom_components tests scripts
